name: Deploy to Production

on:
  workflow_run:
    workflows: ["Test & Validate"]
    types: [completed]
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      SOURCE_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build orchestrator
        run: cd orchestrator && npm run build

      - name: Verify production readiness
        run: |
          echo "🔍 Deployment Checklist:"
          echo "✅ Code compiled successfully"
          ls -lh orchestrator/dist/index.js
          echo "✅ Configuration files present"
          ls -lh orchestrator_config.json
          echo "ℹ️  Runtime files (orchestrator_state.json, logs/) are generated on first run — not stored in repo"

      - name: Create deployment artifact
        run: |
          mkdir -p deployment
          cp -r orchestrator/dist deployment/
          cp orchestrator/package.json deployment/
          cp orchestrator_config.json deployment/
          tar -czf orchestrator-build-${{ env.SOURCE_SHA }}.tar.gz deployment/
          echo "✅ Deployment artifact created"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: orchestrator-build
          path: orchestrator-build-*.tar.gz
          retention-days: 30

      - name: Notify deployment
        run: |
          echo "📦 Deployment package ready at:"
          echo "   orchestrator-build-${{ env.SOURCE_SHA }}.tar.gz"
          echo ""
          echo "To deploy:"
          echo "1. Extract: tar -xzf orchestrator-build-*.tar.gz"
          echo "2. Copy files to production server"
          echo "3. Run: systemctl restart orchestrator"
